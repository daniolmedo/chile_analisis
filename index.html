<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard Económico Chile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Sora:wght@600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ── Reset & tokens ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f3;
  --surface:#ffffff;
  --surface2:#f0efe9;
  --border:#e5e3db;
  --text:#1a1917;
  --text2:#6b6962;
  --text3:#a8a49e;
  --accent:#0d0d0c;
  --green:#16a34a;--green-bg:#f0fdf4;--green-border:#bbf7d0;
  --red:#dc2626;--red-bg:#fef2f2;--red-border:#fecaca;
  --amber:#b45309;--amber-bg:#fefce8;--amber-border:#fde68a;
  --blue:#1d4ed8;
  --r:10px;--r-sm:6px;--r-lg:16px;
  --sh:0 1px 2px rgba(0,0,0,0.06),0 1px 3px rgba(0,0,0,0.04);
  --sh-md:0 4px 16px rgba(0,0,0,0.08);
  --sidebar-w:220px;
  --header-h:56px;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;outline:none}
button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.fade{animation:fadeUp .22s ease both}
.slide{animation:slideIn .2s ease both}

/* ── Layout shell ── */
.shell{display:flex;min-height:100vh}

/* ── Sidebar ── */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;height:100vh;z-index:100;
  overflow-y:auto;
}
.sidebar-logo{
  padding:20px 18px 16px;
  border-bottom:1px solid var(--border);
}
.sidebar-logo-mark{
  display:flex;align-items:center;gap:10px;
}
.sidebar-logo-flag{font-size:22px;line-height:1}
.sidebar-logo-text{font-family:'Sora',sans-serif;font-size:13px;font-weight:700;color:var(--text);letter-spacing:-0.3px;line-height:1.2}
.sidebar-logo-sub{font-size:10px;color:var(--text3);font-weight:400;margin-top:2px}
.sidebar-nav{padding:12px 10px;flex:1}
.nav-section-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:8px 8px 4px}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:var(--r-sm);
  font-size:13px;font-weight:500;color:var(--text2);
  cursor:pointer;transition:all .15s;width:100%;text-align:left;
  margin-bottom:1px;
}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent);color:#fff}
.nav-item.active .nav-icon{opacity:1}
.nav-icon{font-size:15px;opacity:.6;flex-shrink:0;width:18px;text-align:center}
.nav-item.active .nav-icon{opacity:1}
.nav-sub{margin-left:28px;display:flex;flex-direction:column;gap:1px;margin-bottom:4px}
.nav-sub-item{
  padding:6px 10px;border-radius:var(--r-sm);
  font-size:12px;font-weight:400;color:var(--text3);
  cursor:pointer;transition:all .15s;
}
.nav-sub-item:hover{color:var(--text);background:var(--surface2)}
.nav-sub-item.active{color:var(--text);font-weight:500}
.sidebar-footer{
  padding:12px 10px;border-top:1px solid var(--border);
}
.sidebar-footer-text{font-size:10px;color:var(--text3);line-height:1.6;padding:0 8px}

/* ── Main content ── */
.main{
  margin-left:var(--sidebar-w);flex:1;
  display:flex;flex-direction:column;min-height:100vh;
}
.topbar{
  height:var(--header-h);background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;position:sticky;top:0;z-index:50;
}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar-breadcrumb{font-size:12px;color:var(--text3)}
.topbar-sep{color:var(--text3);margin:0 4px}
.topbar-title{font-size:13px;font-weight:600;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:6px}
.topbar-badge{
  font-size:10px;font-weight:600;padding:3px 8px;border-radius:99px;
  background:var(--surface2);color:var(--text2);border:1px solid var(--border);
}
.content{padding:24px 28px;flex:1}

/* ── Cards ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);box-shadow:var(--sh);
  padding:20px;
}
.card-sm{padding:16px}
.card-hover{transition:box-shadow .15s,border-color .15s}
.card-hover:hover{box-shadow:var(--sh-md);border-color:#d1cec6}
.card-click{transition:box-shadow .15s,border-color .15s;cursor:pointer}
.card-click:hover{box-shadow:var(--sh-md);border-color:#c9c6bd}

/* ── Grid ── */
.grid-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.grid-metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}

/* ── Summary cards ── */
.summary-card{text-align:center;padding:20px 16px}
.summary-num{font-family:'Sora',sans-serif;font-size:40px;font-weight:700;line-height:1}
.summary-label{font-size:12px;font-weight:500;margin-top:6px}

/* ── Status pill ── */
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:99px;font-size:10px;font-weight:600;white-space:nowrap;letter-spacing:.02em}

/* ── Metric card ── */
.metric-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.metric-icon{font-size:18px;line-height:1}
.metric-label{font-size:14px;font-weight:600;color:var(--text);margin-top:4px;line-height:1.3}
.metric-note{font-size:11px;color:var(--text3);margin-top:3px}
.metric-bars{margin-bottom:4px}
.metric-bar-row{margin-bottom:10px}
.metric-bar-row:last-child{margin-bottom:0}
.metric-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.metric-bar-label{font-size:12px;font-weight:500;color:var(--text2)}
.metric-bar-val{font-size:12px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace}
.bar-track{height:7px;background:var(--surface2);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ── Context panel (replaces anti-trap accordion) ── */
.ctx-btn{
  margin-top:12px;width:100%;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;border-radius:var(--r-sm);
  font-size:11px;font-weight:600;color:var(--text2);
  background:var(--surface2);border:1px solid var(--border);
  transition:all .15s;
}
.ctx-btn:hover{background:#ebe9e1;border-color:#d1cec6;color:var(--text)}
.ctx-btn.open{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber)}
.ctx-panel{
  margin-top:8px;padding:12px 14px;border-radius:var(--r-sm);
  background:var(--amber-bg);border:1px solid var(--amber-border);
  animation:fadeUp .18s ease;
}
.ctx-text{font-size:12px;color:var(--amber);line-height:1.75}
.ctx-source{font-size:10px;color:var(--amber);opacity:.75;margin-top:6px;font-style:italic}

/* ── Section header ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.section-title{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:var(--text)}
.section-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* ── Gov selector ── */
.gov-selector{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:18px;scrollbar-width:none}
.gov-selector::-webkit-scrollbar{display:none}
.gov-btn{
  flex-shrink:0;padding:9px 16px;border-radius:var(--r);
  border:1.5px solid var(--border);background:var(--surface);
  font-size:12px;font-weight:600;color:var(--text2);
  transition:all .18s;text-align:center;
}
.gov-btn:hover{border-color:#c9c6bd;color:var(--text);background:var(--surface2)}
.gov-btn.active{color:#fff;border-color:transparent}
.gov-btn-name{font-size:13px;font-weight:700}
.gov-btn-period{font-size:10px;opacity:.8;font-weight:400;margin-top:1px}
.gov-btn-coalition{font-size:9px;opacity:.65;font-weight:400}

/* ── Category tabs ── */
.cat-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:18px}
.cat-tab{
  padding:5px 12px;border-radius:99px;
  font-size:11px;font-weight:600;
  border:1px solid var(--border);background:var(--surface);
  color:var(--text2);transition:all .15s;
}
.cat-tab:hover{background:var(--surface2);color:var(--text)}
.cat-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── Gov content card ── */
.gov-headline{font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px}
.gov-name-badge{font-size:13px;font-weight:600;margin-bottom:2px}
.gov-summary{
  font-size:13px;color:var(--text2);line-height:1.75;
  padding:12px 16px;background:var(--surface2);
  border-radius:var(--r-sm);border-left:3px solid var(--border);
  margin-bottom:16px;
}
.metrics-mini-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:4px}
.mini-metric{border-radius:var(--r-sm);padding:11px 13px}
.mini-metric-label{font-size:10px;font-weight:700;margin-bottom:4px}
.mini-metric-val{font-size:14px;font-weight:700}

/* ── Achievement list ── */
.achievement-item{
  padding:9px 14px;border-radius:var(--r-sm);
  font-size:12px;font-weight:500;margin-bottom:6px;
}
.achievement-item:last-child{margin-bottom:0}

/* ── Parliament ── */
.seat-bar{display:flex;border-radius:5px;overflow:hidden;height:16px;width:100%}
.party-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.party-row{display:flex;align-items:center;gap:9px;padding:7px 11px;border-radius:var(--r-sm);background:var(--surface2);border:1px solid var(--border)}
.party-name{font-size:12px;font-weight:600;color:var(--text);flex:1}
.party-bloc{font-size:10px;color:var(--text3)}
.party-seats{font-size:11px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace}
.law-item{padding:11px 14px;border-radius:var(--r-sm);margin-bottom:8px;border-left-width:3px;border-left-style:solid}
.law-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px}
.law-desc{font-size:11px;color:var(--text2);line-height:1.6}
.law-meta{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
.law-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:.04em}
.law-year{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.impact-dot{width:5px;height:5px;border-radius:50%;display:inline-block}

/* ── Context columns ── */
.ctx-col{border-radius:var(--r-sm);padding:14px}

/* ── Caja fiscal ── */
.alert-banner{border-radius:var(--r);padding:14px 18px;margin-bottom:18px;border-left:4px solid}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:18px}
.kpi-card{border-radius:var(--r-sm);padding:14px}
.kpi-icon{font-size:18px;margin-bottom:8px}
.kpi-label{font-size:10px;font-weight:700;margin-bottom:4px}
.kpi-val{font-size:18px;font-weight:800;font-family:'DM Mono',monospace;margin-bottom:3px}
.kpi-sub{font-size:10px;opacity:.75;line-height:1.4}
.caja-bar-chart{display:flex;align-items:flex-end;gap:8px;height:110px;padding:0 2px;margin-bottom:8px}
.caja-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.caja-bar-val{font-size:9px;font-weight:700;text-align:center;font-family:'DM Mono',monospace}
.caja-bar-fill{width:100%;border-radius:4px 4px 0 0}
.caja-bar-label{font-size:8px;text-align:center;line-height:1.3}

/* ── SVG line chart ── */
.chart-wrap{overflow-x:auto;width:100%}

/* ── Tags ── */
.tag-econ{background:#dbeafe;color:#1e40af}
.tag-soc{background:#d1fae5;color:#065f46}
.tag-ins{background:#ede9fe;color:#5b21b6}
.tag-sec{background:#fee2e2;color:#991b1b}
.tag-amb{background:#ecfdf5;color:#166534}

/* ── Mobile nav ── */
.mobile-nav{
  display:none;
  position:sticky;top:0;z-index:100;
  background:var(--surface);border-bottom:1px solid var(--border);
}
.mobile-nav-top{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  border-bottom:1px solid var(--border);
}
.mobile-nav-logo{display:flex;align-items:center;gap:8px}
.mobile-nav-tabs{
  display:flex;overflow-x:auto;padding:8px 12px;gap:6px;scrollbar-width:none;
}
.mobile-nav-tabs::-webkit-scrollbar{display:none}
.mobile-tab{
  flex-shrink:0;padding:5px 12px;border-radius:99px;
  font-size:11px;font-weight:600;color:var(--text2);
  border:1px solid var(--border);background:var(--surface);
  transition:all .15s;white-space:nowrap;
}
.mobile-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── Responsive ── */
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0}
  .mobile-nav{display:block}
  .topbar{display:none}
  .content{padding:16px}
  .grid-summary{grid-template-columns:repeat(3,1fr)}
  .grid-metrics{grid-template-columns:1fr}
  .grid-2{grid-template-columns:1fr}
  .gov-selector{flex-wrap:nowrap}
}
@media(max-width:480px){
  .grid-summary{grid-template-columns:1fr;gap:8px}
  .content{padding:12px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;

/* ─── TOKENS ─── */
const ST={
  good:{bg:'#f0fdf4',color:'#15803d',border:'#bbf7d0',label:'Mejor que OCDE',dot:'#16a34a'},
  warning:{bg:'#fefce8',color:'#a16207',border:'#fde68a',label:'Mixto',dot:'#ca8a04'},
  bad:{bg:'#fef2f2',color:'#b91c1c',border:'#fecaca',label:'Bajo OCDE',dot:'#dc2626'},
};

/* ─── DATA: OCDE ─── */
const OCDE=[
  {id:'pib',icon:'💰',label:'PIB per cápita',chile:27000,ocde:55000,fmt:'usd',status:'bad',note:'49% del promedio OCDE',ctx:'Chile duplicó su PIB per cápita real en 20 años — el mayor avance de América Latina. El gap se reduce sostenidamente, pero requiere décadas de crecimiento consistente. Usarlo como argumento de "colapso" ignora que la tendencia es de convergencia.',source:'Banco Mundial 2024'},
  {id:'pib_crec',icon:'📈',label:'Crecimiento PIB 2024',chile:2.6,ocde:1.7,fmt:'pct',status:'good',note:'Chile supera el promedio OCDE',ctx:'Crecer 2.6% cuando la OCDE promedia 1.7% es un resultado sólido. Este dato suele ignorarse en el debate cuando se cita solo el déficit o la deuda. El crecimiento de 2024 estuvo impulsado por consumo e inversión, no por gasto fiscal.',source:'Banco Central | OCDE 2024'},
  {id:'inf',icon:'🎯',label:'Inflación 2024',chile:4.3,ocde:3.0,fmt:'pct',status:'warning',note:'Sobre la meta del 3% — bajando',ctx:'La inflación de 14.1% en 2022 fue consecuencia directa de los 3 retiros de AFP aprobados por el Congreso (2020–2021), que inyectaron ~US$50.000M a la economía. La baja desde ese peak a 4.3% en 2024 responde a política monetaria del Banco Central, con ajuste fiscal inicial del gobierno Boric.',source:'Banco Central de Chile 2024'},
  {id:'deuda',icon:'🏛️',label:'Deuda Pública / PIB',chile:41.7,ocde:110,fmt:'pct',status:'good',note:'Entre las más bajas de la OCDE',ctx:'El promedio de deuda/PIB de la OCDE ronda el 110%. Chile a 41.7% es uno de los países con mayor solvencia del bloque. El Consejo Fiscal Autónomo proyecta que se mantendrá por debajo del límite prudente del 45% hasta 2030.',source:'DIPRES | CFA 2024'},
  {id:'trib',icon:'🧾',label:'Ingresos Tributarios / PIB',chile:20,ocde:34,fmt:'pct',status:'bad',note:'2° más bajo de toda la OCDE',ctx:'Chile recauda el 20% del PIB frente al 34% promedio OCDE. Esto limita estructuralmente el gasto en salud, educación e infraestructura. El debate sobre qué tan bajo debe ser la recaudación es legítimo — lo que no es válido es presentarlo como "eficiencia" sin reconocer sus consecuencias en servicios públicos.',source:'OCDE Revenue Statistics 2024'},
  {id:'gini',icon:'⚖️',label:'Coeficiente Gini',chile:0.43,ocde:0.31,fmt:'dec',status:'bad',note:'De los más desiguales de la OCDE',ctx:'Chile bajó su Gini de 0.57 (1990) a 0.43 hoy — una mejora de 30 años. Sin embargo, sigue siendo uno de los países más desiguales del bloque. Ambos hechos son ciertos: la tendencia es positiva y el nivel actual sigue siendo alto respecto a pares.',source:'CASEN 2024 | OCDE'},
  {id:'desemp',icon:'👷',label:'Desempleo 2025',chile:9.0,ocde:5.0,fmt:'pct',status:'bad',note:'Alto desempleo estructural',ctx:'El 9% de desempleo es real y significativo. Parte de la brecha con la OCDE se explica por informalidad laboral (en muchos países los trabajadores informales no aparecen en la tasa de desempleo) y por mayor participación laboral femenina, que eleva el denominador. Ninguno de estos factores elimina el problema.',source:'INE 2025'},
  {id:'fem',icon:'👩‍💼',label:'Participación Lab. Femenina',chile:52,ocde:65,fmt:'pct',status:'bad',note:'13 puntos bajo el promedio OCDE',ctx:'13 puntos de brecha equivalen a millones de mujeres fuera del mercado laboral formal. La evidencia internacional muestra que sala cuna universal, licencias parentales compartidas y trabajo flexible tienen impacto directo en este indicador. No es solo un tema de equidad — tiene efectos directos en crecimiento potencial.',source:'INE | OCDE 2024'},
  {id:'edus',icon:'🎓',label:'Gasto Ed. Superior / PIB',chile:1.34,ocde:1.08,fmt:'pct',status:'good',note:'4° más alto de toda la OCDE',ctx:'Chile invierte más en educación superior que el promedio OCDE. Antes de la gratuidad (2016), Chile era el país con mayor costo universitario en relación al salario de toda la OCDE. La política de gratuidad redujo drásticamente el endeudamiento estudiantil de familias de clase media.',source:'OCDE Education at a Glance 2024'},
  {id:'edue',icon:'🏫',label:'Gasto Ed. Escolar / PIB',chile:3.1,ocde:3.38,fmt:'pct',status:'warning',note:'Bajo el promedio OCDE',ctx:'Chile gasta menos en educación escolar (básica y media) que el promedio OCDE. Aquí es donde se reproducen las principales brechas de desigualdad: la diferencia de calidad entre colegios públicos y privados determina trayectorias de vida desde los 6 años.',source:'OCDE Education at a Glance 2024'},
];

/* ─── DATA: GOBIERNOS ─── */
const GOVS=[
  {id:'b1',name:'Bachelet I',period:'2006–2010',coalition:'Concertación',color:'#dc2626',gdp:3.5,dEnd:5.8,
    economic:{headline:'Crecimiento sólido sobre base de commodities',summary:'Período de alto crecimiento sostenido por el súper ciclo del cobre. El mérito central fue la disciplina fiscal: guardar los excedentes en el FEES en vez de gastarlos, como sí hicieron Venezuela, Ecuador y Argentina con sus bonanzas.',metrics:[{l:'PIB promedio anual',v:'3.5%',s:'good'},{l:'Deuda fin período',v:'5.8% PIB',s:'good'},{l:'Superávit estructural',v:'Mantenido',s:'good'},{l:'Precio cobre prom.',v:'~US$3.0/lb',s:'good'}],ctx:'El 3.5% de crecimiento no fue solo gestión de gobierno. El súper ciclo del cobre fue el factor dominante. El mérito real está en no dilapidar esos recursos — el FEES acumulado sería clave para la reconstrucción post-27F y para crisis posteriores.'},
    social:{headline:'Cimientos del Estado de bienestar moderno',summary:'Se crearon los principales pilares del sistema de protección social chileno: Pilar Solidario, APS, expansión del AUGE a 56 patologías, Chile Crece Contigo. El gran tropiezo fue el lanzamiento del Transantiago.',metrics:[{l:'Reforma Previsional 2008',v:'APS + Pilar Solidario',s:'good'},{l:'Expansión AUGE/GES',v:'+56 patologías',s:'good'},{l:'Chile Crece Contigo',v:'Protección infancia',s:'good'},{l:'Transantiago',v:'Lanzamiento caótico',s:'bad'}],ctx:'La reforma previsional de 2008 creó el Pilar Solidario que hoy paga las pensiones más bajas. Sin esa reforma, la crisis previsional actual sería considerablemente más severa. Este hito rara vez aparece en el debate sobre pensiones.'},
    structural:{headline:'Ahorro fiscal histórico: el FEES',summary:'La creación del Fondo de Estabilización Económica y Social con los superávits del cobre es probablemente la mejor decisión macroestructural de un gobierno chileno en democracia.',metrics:[{l:'FEES creado',v:'US$11.000M+',s:'good'},{l:'FRP Pensiones',v:'Creado',s:'good'},{l:'Cambio deuda/PIB',v:'+0.8pp',s:'good'},{l:'Regla fiscal',v:'Cumplida',s:'good'}],ctx:'El FEES acumulado en este período permitió a Piñera financiar la reconstrucción post-27F y a gobiernos posteriores enfrentar la pandemia con mayor margen. Es la herencia estructural más valiosa de la democracia chilena.'},
    achievements:['✅ Creación del FEES y FRP con superávit del cobre','✅ Reforma previsional 2008 (Pilar Solidario + APS)','✅ Expansión del AUGE a 56 patologías','✅ Chile Crece Contigo','✅ Manejo exitoso de la Crisis Subprime 2009','⚠️ Transantiago: lanzamiento caótico y costoso','⚠️ Terremoto 27F ocurre 10 días antes del término del mandato'],
    context:{fav:['Súper ciclo del cobre (precios históricos)','Economía mundial expansiva 2006–2008','Fuerte demanda asiática de materias primas'],adv:['Crisis Subprime 2008–2009','Terremoto 27F (últimos 10 días del mandato)','Caos en lanzamiento del Transantiago'],ctx:'El crecimiento de 3.5% es inseparable del boom del cobre. El verdadero mérito fue la disciplina de ahorro. La crisis Subprime de 2009 generó contracción real del PIB — manejada sin mayor impacto gracias a los fondos acumulados.'}},
  {id:'p1',name:'Piñera I',period:'2010–2014',coalition:'Alianza',color:'#2563eb',gdp:5.4,dEnd:12.7,
    economic:{headline:'Mayor crecimiento post-dictadura, con contexto excepcional',summary:'El período de mayor crecimiento registrado en democracia, impulsado por el rebote post-terremoto y el precio récord del cobre (US$4.5/lb en 2011). Las condiciones externas fueron excepcionalmente favorables e irrepetibles.',metrics:[{l:'PIB promedio anual',v:'5.4%',s:'good'},{l:'Deuda fin período',v:'12.7% PIB',s:'warning'},{l:'Desempleo mínimo',v:'6.2% (2013)',s:'good'},{l:'Precio cobre prom.',v:'~US$3.5/lb',s:'good'}],ctx:'El 5.4% y el mínimo histórico de desempleo del 6.2% son reales — y también son irrepetibles sin las mismas condiciones. El precio récord del cobre (US$4.5/lb en 2011) explica la mayor parte. La deuda pública casi se triplicó en este período, algo que pocas veces aparece en el debate.'},
    social:{headline:'Bonanza sin traducción en cohesión social',summary:'El período de mayor crecimiento coincidió con la mayor movilización social desde 1990. El movimiento estudiantil de 2011 demostró que el crecimiento del PIB no equivale automáticamente a mayor equidad percibida.',metrics:[{l:'Mov. estudiantil 2011',v:'Crisis política mayor',s:'bad'},{l:'Desempleo (mínimo)',v:'6.2%',s:'good'},{l:'Reducción pobreza',v:'Continuó tendencia',s:'good'},{l:'Demanda educacional',v:'Gratuidad exigida',s:'warning'}],ctx:'El movimiento estudiantil de 2011 fue una señal de que el crecimiento del PIB por sí solo no resuelve las demandas de equidad. La respuesta institucional fue insuficiente, lo que profundizó la crisis de legitimidad del modelo.'},
    structural:{headline:'Primera gran expansión de la deuda bajo un gobierno de derecha',summary:'La deuda pública casi se triplicó (5.8% → 12.7% del PIB). La causa fue legítima — reconstrucción post-27F — pero el patrón de endeudamiento estructural comenzó aquí, no con los gobiernos siguientes.',metrics:[{l:'Cambio deuda/PIB',v:'+6.9pp',s:'warning'},{l:'Reconstrucción 27F',v:'~US$30.000M',s:'good'},{l:'FEES utilizado',v:'Para reconstrucción',s:'good'},{l:'Reforma tributaria',v:'Insuficiente',s:'warning'}],ctx:'La deuda casi se triplicó bajo este gobierno. Moody\'s confirmó que el deterioro de la posición fiscal chilena comenzó en 2010, no en 2014. Esto suele omitirse cuando se critica el endeudamiento de gobiernos posteriores.'},
    achievements:['✅ Reconstrucción exitosa post-terremoto 27F','✅ Mínimo histórico de desempleo (6.2% en 2013)','✅ Crecimiento promedio de 5.4% anual','✅ Rescate de los 33 mineros','⚠️ Deuda pública casi triplicada (+6.9pp del PIB)','❌ Respuesta insuficiente al movimiento estudiantil 2011','❌ Conflicto mapuche: uso de Ley Antiterrorista'],
    context:{fav:['Precio del cobre en récord histórico (~US$4.5/lb en 2011)','Rebote económico post-terremoto','FEES lleno heredado de Bachelet I (US$11.000M+)'],adv:['Terremoto 27F en la primera semana de gobierno','Movimiento estudiantil 2011','Huelgas en el sector minero'],ctx:'Comparar el 5.4% de Piñera I con cualquier gobierno posterior sin mencionar el precio del cobre es la trampa más frecuente del debate económico chileno. Son condiciones — cobre a US$4.5/lb, rebote post-terremoto, FEES lleno — que no volverán a darse simultáneamente.'}},
  {id:'b2',name:'Bachelet II',period:'2014–2018',coalition:'Nueva Mayoría',color:'#dc2626',gdp:1.8,dEnd:23.6,
    economic:{headline:'Desaceleración por caída del cobre y reformas simultáneas',summary:'Período marcado por la caída del precio del cobre de US$3.5 a US$2.1/lb (-40%). Las reformas simultáneas generaron incertidumbre en el sector privado. Ambos factores explican el bajo crecimiento.',metrics:[{l:'PIB promedio anual',v:'1.8%',s:'bad'},{l:'Deuda fin período',v:'23.6% PIB',s:'warning'},{l:'Caída precio cobre',v:'-40% respecto período ant.',s:'bad'},{l:'Recaudación adicional',v:'+3pp PIB',s:'good'}],ctx:'El bajo crecimiento (1.8%) fue causado principalmente por la caída del cobre (-40%) — el mismo factor que había inflado el 5.4% de Piñera I. Atribuirlo solo a la reforma tributaria ignora el contexto externo. La coincidencia temporal no establece causalidad.'},
    social:{headline:'Mayor paquete de reformas sociales desde la dictadura',summary:'El período con mayor densidad de cambios sociales en democracia: gratuidad universitaria, inclusión escolar, reforma laboral, aborto en 3 causales. Los beneficios son de largo plazo.',metrics:[{l:'Gratuidad universitaria',v:'Iniciada 2016',s:'good'},{l:'Ley de inclusión',v:'Fin al lucro',s:'good'},{l:'Reforma laboral',v:'Negociación colectiva',s:'good'},{l:'Aborto 3 causales',v:'Ley 2017',s:'good'}],ctx:'Antes de 2016, Chile era el país con mayor costo universitario en relación al salario de toda la OCDE. La gratuidad redujo el endeudamiento de familias de clase media. Los efectos de la ley de inclusión escolar y la reforma laboral son de largo plazo.'},
    structural:{headline:'Reforma tributaria con impacto mixto pero necesaria',summary:'La reforma aumentó la recaudación en ~3pp del PIB, financiando gratuidad y reformas sociales. La deuda subió 10.9pp, pero el contexto de caída del cobre reduce la atribución directa al gasto.',metrics:[{l:'Cambio deuda/PIB',v:'+10.9pp',s:'bad'},{l:'Recaudación adicional',v:'+3pp PIB',s:'good'},{l:'Gratuidad financiada',v:'Con reforma tributaria',s:'good'},{l:'Inversión privada',v:'Cayó significativamente',s:'bad'}],ctx:'La reforma tributaria recaudó más, pero también redujo la inversión privada. Cuánto de la caída se atribuye a la reforma y cuánto al precio del cobre es un debate metodológico no resuelto. Lo que sí es claro es que la recaudación adicional financió servicios que antes no existían.'},
    achievements:['✅ Gratuidad en educación superior (2016)','✅ Mayor recaudación tributaria del período democrático','✅ Ley de inclusión escolar: fin al lucro','✅ Aborto en 3 causales','✅ Reforma laboral: negociación colectiva reforzada','⚠️ Casos Penta/SQM: financiamiento ilegal dañó credibilidad','❌ Menor crecimiento promedio del período democrático (1.8%)'],
    context:{fav:['Mayoría parlamentaria histórica (incluyendo PC por primera vez)','Alta demanda social post-movilizaciones 2011'],adv:['Caída del cobre -40% (de US$3.5 a US$2.1/lb)','Casos Penta/SQM: financiamiento ilegal','Desconfianza empresarial por reformas simultáneas'],ctx:'Comparar el 1.8% de Bachelet II con el 5.4% de Piñera I sin mencionar la caída del cobre es la principal trampa del debate económico. El mismo factor (precio del cobre) explica en sentidos opuestos los resultados de ambos períodos.'}},
  {id:'p2',name:'Piñera II',period:'2018–2022',coalition:'Chile Vamos',color:'#2563eb',gdp:2.5,dEnd:36.0,
    economic:{headline:'Estallido + pandemia + rebote artificial: el período más volátil',summary:'El promedio de 2.5% esconde una realidad extrema: -5.8% en 2020 (pandemia) y +11.7% en 2021 (rebote por los retiros de AFP). El agregado no refleja la volatilidad ni sus consecuencias estructurales.',metrics:[{l:'PIB promedio anual',v:'2.5% (muy volátil)',s:'warning'},{l:'PIB 2020',v:'-5.8% (pandemia)',s:'bad'},{l:'PIB 2021',v:'+11.7% (rebote AFP)',s:'warning'},{l:'Deuda fin período',v:'~36% PIB',s:'warning'}],ctx:'El +11.7% de 2021 fue el mayor crecimiento registrado en la historia económica chilena moderna. Su causa: el rebote de los 3 retiros de AFP aprobados por el Congreso contra los vetos del propio Piñera. Esa inyección masiva de liquidez generó la inflación del 14.1% que heredó el siguiente gobierno.'},
    social:{headline:'La mayor crisis social desde el retorno democrático',summary:'El período registra simultáneamente la crisis social más grave desde 1990 y la campaña de vacunación contra COVID más rápida del mundo en velocidad relativa.',metrics:[{l:'Estallido social 2019',v:'30 muertos, 460 oculares',s:'bad'},{l:'IFE Universal 2021',v:'+5M hogares',s:'good'},{l:'Vacunación COVID',v:'Más rápida del mundo',s:'good'},{l:'3 retiros AFP',v:'US$50.000M retirados',s:'bad'}],ctx:'La vacunación fue un logro logístico genuino de este gobierno, reconocido internacionalmente. El IFE Universal fue una respuesta de protección social masiva ante la pandemia. El estallido de 2019 mostró acumulación de demandas que no se resolvieron con el crecimiento del primer período.'},
    structural:{headline:'El mayor aumento de deuda del período democrático, bajo gobierno de derecha',summary:'La deuda pública subió 12.4pp — el mayor incremento de cualquier gobierno democrático. La pandemia justifica parte. Los retiros de AFP son el mayor error estructural del período.',metrics:[{l:'Cambio deuda/PIB',v:'+12.4pp — el mayor',s:'bad'},{l:'3 retiros AFP',v:'US$50.000M',s:'bad'},{l:'Gasto COVID (IFE)',v:'Justificado por pandemia',s:'good'},{l:'Inflación heredada',v:'14.1%',s:'bad'}],ctx:'El mayor aumento de deuda pública del período democrático ocurrió bajo Piñera II (+12.4pp), no bajo Bachelet II (+10.9pp) ni bajo Boric (+5.7pp). La pandemia explica parte del gasto. Los retiros de AFP — aprobados contra la voluntad del ejecutivo — son una decisión del Congreso con consecuencias estructurales para el sistema previsional.'},
    achievements:['✅ Vacunación COVID: la más rápida del mundo en velocidad relativa','✅ IFE Universal: protección masiva durante pandemia','✅ Proceso Constituyente: salida institucional al estallido','⚠️ 3 retiros AFP: alivio de corto plazo, daño estructural al sistema previsional','❌ Estallido social: 30 muertos, 460 con daño ocular permanente','❌ Inflación 14.1% al final del período'],
    context:{fav:['Reservas internacionales robustas','Precio del cobre se recuperó en 2021','Liderazgo logístico en la vacunación'],adv:['Estallido social octubre 2019','Pandemia COVID-19 (2020–2021)','3 retiros AFP aprobados por el Congreso en contra de sus vetos'],ctx:'El +11.7% de 2021 no fue un logro del ejecutivo: fue el rebote artificial de los retiros AFP que Piñera intentó vetar. Ese mismo shock monetario generó la inflación de 14.1% que debió enfrentar el gobierno siguiente.'}},
  {id:'bo',name:'Boric',period:'2022–2026',coalition:'Apruebo Dignidad',color:'#7c3aed',gdp:2.0,dEnd:41.7,
    economic:{headline:'Ajuste macroeconómico obligado ante herencia inflacionaria',summary:'El gobierno asumió con la inflación más alta desde 1991 (14.1%), producto de los retiros de AFP del período anterior. El ajuste fue costoso en términos de crecimiento pero necesario para estabilizar la economía.',metrics:[{l:'PIB promedio anual',v:'2.0%',s:'warning'},{l:'Inflación: 14.1%→4.3%',v:'Bajó en 2 años',s:'good'},{l:'IED 2022',v:'US$17.105M — máx. desde 2015',s:'good'},{l:'Inversión 2025',v:'+8.9%',s:'good'}],ctx:'La IED de 2022 (US$17.105M) fue la más alta desde 2015. La inversión de 2025 creció +8.9%. Estos datos contradicen el relato de que el gobierno "espantó" la inversión. La desaceleración de 2023 fue parte del ajuste antiinflacionario, no una fuga de capitales ideológica.'},
    social:{headline:'Reformas en contexto de minoría parlamentaria',summary:'La Pensión Garantizada Universal se implementó. La reforma previsional fue aprobada parcialmente tras larga negociación. El desempleo del 9% es el indicador social más débil del período.',metrics:[{l:'Pensión Garantizada Universal',v:'Implementada',s:'good'},{l:'Reducción jornada',v:'45→40h semanales',s:'good'},{l:'Desempleo 2025',v:'9%',s:'bad'},{l:'Reform. previsional',v:'Aprobada parcialmente',s:'warning'}],ctx:'El desempleo del 9% es real y significativo. Parte del aumento refleja mayor participación laboral femenina (más personas buscando trabajo formalmente) y la formalización de empleos que antes eran informales. Ninguno de estos factores elimina el problema estructural.'},
    structural:{headline:'Menor aumento de deuda de los últimos tres gobiernos',summary:'El incremento de +5.7pp es el menor de los últimos 3 gobiernos. El déficit estructural de 3.6% del PIB en 2025 es real y problemático, aunque su causa principal fue sobreestimación de ingresos, no exceso de gasto.',metrics:[{l:'Cambio deuda/PIB',v:'+5.7pp — el menor',s:'good'},{l:'Déficit estructural 2025',v:'3.6% del PIB',s:'bad'},{l:'Causa (CFA + FMI)',v:'Sobreestimación ingresos',s:'warning'},{l:'Regla fiscal',v:'Incumplida 3 años',s:'bad'}],ctx:'El CFA y el FMI identificaron la causa del déficit como sobreestimación sistemática de ingresos fiscales, no exceso de gasto. El gobierno creció el gasto en promedio 3.47% anual real — menos que Piñera II (4.96%/año). El aumento de deuda de +5.7pp es el menor de los últimos tres gobiernos.'},
    achievements:['✅ Inflación reducida de 14.1% a 4.3% en 2 años','✅ Pensión Garantizada Universal implementada','✅ IED 2022: máxima desde 2015 (US$17.105M)','✅ Inversión 2025: +8.9%','✅ Reducción jornada laboral a 40h semanales','✅ Menor aumento de deuda de los últimos 3 gobiernos (+5.7pp)','⚠️ Déficit estructural 3.6% — regla fiscal incumplida 3 años','❌ Desempleo 9% — el más alto del período reciente','❌ Doble rechazo constitucional (2022 y 2023)'],
    context:{fav:['Precio del cobre relativamente alto','Recuperación global post-COVID'],adv:['Herencia inflacionaria de 14.1% (retiros AFP)','Crisis de seguridad regional','Tasas de la Fed en máximos históricos','Doble derrota constitucional'],ctx:'El gobierno de Boric recibió las condiciones más adversas de los últimos períodos: inflación de 14.1% heredada, tasas internacionales en máximos, ajuste fiscal obligatorio y doble derrota constitucional. El 2.0% promedio de crecimiento se da en ese contexto, no en las condiciones de Piñera I.'}}

      </div>);

/* SVG area/line chart — debt over time */
function LineChart({data}){
  const W=300,H=130,PL=34,PR=10,PT=18,PB=28;
  const iW=W-PL-PR,iH=H-PT-PB;
  const max=Math.max(...data.map(d=>d.val))*1.1;
  const xOf=i=>PL+i*(iW/(data.length-1));
  const yOf=v=>PT+(1-v/max)*iH;
  const path=data.map((d,i)=>`${i===0?'M':'L'}${xOf(i).toFixed(1)},${yOf(d.val).toFixed(1)}`).join(' ');
  const area=`${path} L${xOf(data.length-1).toFixed(1)},${(PT+iH).toFixed(1)} L${xOf(0).toFixed(1)},${(PT+iH).toFixed(1)} Z`;
  const ticks=[0,20,40];
  return(<div style={{overflowX:'auto',width:'100%'}}>
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',display:'block',minWidth:200}}>
      <defs><linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#6366f1" stopOpacity=".12"/><stop offset="100%" stopColor="#6366f1" stopOpacity="0"/></linearGradient></defs>
      {ticks.map((v,i)=>{const y=yOf(v);return <g key={i}><line x1={PL} y1={y} x2={W-PR} y2={y} stroke="#e5e3db" strokeWidth="1"/><text x={PL-4} y={y+4} fontSize="7.5" fill="var(--text3)" textAnchor="end">{v}%</text></g>;})}
      <path d={area} fill="url(#lg1)"/>
      <path d={path} fill="none" stroke="#6366f1" strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round"/>
      {data.map((d,i)=>{const x=xOf(i),y=yOf(d.val);return <g key={i}><circle cx={x} cy={y} r="3.5" fill="#6366f1" stroke="white" strokeWidth="1.5"/><text x={x} y={y-8} fontSize="7.5" fill="#6366f1" textAnchor="middle" fontWeight="600">{d.val}%</text><text x={x} y={H-3} fontSize="7" fill="var(--text3)" textAnchor="middle">{d.short}</text></g>;})}
    </svg>
  </div>);
}

/* SVG sparkline — compact trend line, no axes */
function Sparkline({vals,color='#6366f1',height=32}){
  const W=80,H=height,pad=3;
  const min=Math.min(...vals),max=Math.max(...vals);
  const range=max-min||1;
  const xOf=i=>pad+i*((W-pad*2)/(vals.length-1));
  const yOf=v=>H-pad-(v-min)/range*(H-pad*2);
  const path=vals.map((v,i)=>`${i===0?'M':'L'}${xOf(i).toFixed(1)},${yOf(v).toFixed(1)}`).join(' ');
  return(<svg viewBox={`0 0 ${W} ${H}`} style={{width:W,height:H,display:'block'}}>
    <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
    <circle cx={xOf(vals.length-1)} cy={yOf(vals[vals.length-1])} r="2.5" fill={color}/>
  </svg>);
}

/* SVG donut — proportion chart */
function Donut({val,max,color,size=52}){
  const R=20,cx=26,cy=26,circ=2*Math.PI*R;
  const pct=Math.min(val/max,1);
  const dash=pct*circ;
  return(<svg width={size} height={size} viewBox="0 0 52 52" style={{flexShrink:0}}>
    <circle cx={cx} cy={cy} r={R} fill="none" stroke="#f0efe9" strokeWidth="5"/>
    <circle cx={cx} cy={cy} r={R} fill="none" stroke={color} strokeWidth="5"
      strokeDasharray={`${dash.toFixed(1)} ${circ.toFixed(1)}`}
      strokeLinecap="round" transform="rotate(-90 26 26)"/>
    <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="middle"
      fontSize="9" fontWeight="700" fill={color} fontFamily="'DM Mono',monospace">
      {Math.round(pct*100)}%
    </text>
  </svg>);
}

/* ParliamentView: parliament tab as proper component — no hooks needed */
function ParliamentView({gov,parl,lawFilter,setLawFilter}){
  const offS=parl.parties.filter(p=>p.bloc==='Oficialismo').reduce((a,p)=>a+p.sc,0);
  const offC=parl.parties.filter(p=>p.bloc==='Oficialismo').reduce((a,p)=>a+p.dc,0);
  const oppS=parl.parties.filter(p=>p.bloc==='Oposición').reduce((a,p)=>a+p.sc,0);
  const oppC=parl.parties.filter(p=>p.bloc==='Oposición').reduce((a,p)=>a+p.dc,0);
  const hasMaj=(offS>parl.senate.total/2)&&(offC>parl.chamber.total/2);
  const laws=lawFilter==='all'?parl.laws:parl.laws.filter(l=>l.cat===lawFilter);
  return(<div className="fade">
    <div className="card" style={{marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:600,color:gov.color,marginBottom:3}}>{gov.name} · {gov.period}</div>
      <div className="gov-headline" style={{marginBottom:10}}>Composición parlamentaria</div>
      <p style={{fontSize:12,color:'var(--text2)',lineHeight:1.7,marginBottom:14}}>{parl.context}</p>
      <div style={{display:'inline-flex',alignItems:'center',gap:6,padding:'5px 12px',borderRadius:99,marginBottom:16,
        background:hasMaj?ST.good.bg:ST.bad.bg,border:`1px solid ${hasMaj?ST.good.border:ST.bad.border}`}}>
        <span style={{fontSize:12,fontWeight:700,color:hasMaj?ST.good.color:ST.bad.color}}>
          {hasMaj?'✅ Mayoría en ambas cámaras':'❌ Sin mayoría parlamentaria propia'}
        </span>
      </div>
      <div className="grid-2" style={{marginBottom:14}}>
        {[{t:'Senado',total:parl.senate.total,off:offS,opp:oppS,nota:parl.senate.nota},
          {t:'Cámara',total:parl.chamber.total,off:offC,opp:oppC,nota:parl.chamber.nota}].map((ch,i)=>(
          <div key={i} style={{background:'var(--surface2)',borderRadius:'var(--r-sm)',padding:14,border:'1px solid var(--border)'}}>
            <div style={{fontWeight:700,fontSize:12,marginBottom:8}}>{ch.t}</div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:6}}>
              <span style={{color:gov.color,fontWeight:600}}>Oficialismo: {ch.off}</span>
              <span style={{color:'var(--text3)',fontWeight:600}}>Oposición: {ch.opp}</span>
            </div>
            <div className="seat-bar">
              <div style={{width:`${(ch.off/ch.total)*100}%`,background:gov.color}}/>
              <div style={{width:`${((ch.total-ch.off-ch.opp)/ch.total)*100}%`,background:'var(--border)'}}/>
              <div style={{width:`${(ch.opp/ch.total)*100}%`,background:'#94a3b8'}}/>
            </div>
            <div style={{fontSize:10,color:'var(--text3)',marginTop:6,lineHeight:1.4}}>{ch.nota}</div>
          </div>
        ))}
      </div>
      <div style={{fontSize:12,fontWeight:700,marginBottom:10}}>Distribución por partido</div>
      <div className="grid-3" style={{marginBottom:4}}>
        {parl.parties.map((p,i)=>(
          <div key={i} className="party-row">
            <span className="party-dot" style={{background:p.color}}/>
            <span className="party-name">{p.name}</span>
            <span className="party-bloc">{p.bloc.slice(0,3)}</span>
            <span className="party-seats">S:{p.sc} D:{p.dc}</span>
          </div>

      </div>
      <div style={{fontSize:10,color:'var(--text3)',marginTop:8}}>S = Senadores · D = Diputados</div>

    <div className="card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8,marginBottom:14}}>

            <button key={f} onClick={()=>setLawFilter(f)}
              style={{padding:'3px 9px',borderRadius:99,fontSize:10,fontWeight:600,
                background:lawFilter===f?'var(--text)':'var(--surface2)',
                color:lawFilter===f?'white':'var(--text2)',
                border:'1px solid var(--border)',transition:'all .15s'}}>
              {f==='all'?'Todas':CAT_LABELS[f]}
            </button>
          ))}
        </div>
      </div>
      {laws.map((law,i)=>{
        const rej=law.name.includes('RECHAZADA');
        return(<div key={i} className="law-item"
          style={{background:rej?ST.bad.bg:'var(--surface2)',

        const isExpanded=expanded===item.id||active===item.id||(item.sub&&item.sub.some(s=>s.id===active));
