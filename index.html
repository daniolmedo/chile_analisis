// ============================================================
// HELPERS
// ============================================================
const MC = {
  good:    ["#dcfce7","#166534","✅"],
  warning: ["#fef9c3","#854d0e","⚠️"],
  bad:     ["#fee2e2","#991b1b","❌"]
};

function StatusBadge({status}) {
  const cfg = {
    good:    {emoji:"✅", text:"Mejor que OCDE", bg:"#dcfce7", color:"#166534"},
    warning: {emoji:"⚠️", text:"Mixto",          bg:"#fef9c3", color:"#854d0e"},
    bad:     {emoji:"❌", text:"Bajo OCDE",       bg:"#fee2e2", color:"#991b1b"}
  };
  const c = cfg[status];
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 10px",
      borderRadius:999,fontSize:11,fontWeight:700,background:c.bg,color:c.color}}>
      {c.emoji} {c.text}
    </span>
  );
}

function fmtVal(val, format) {
  if (format==="currency") return `US$${(val/1000).toFixed(0)}k`;
  if (format==="percent")  return `${val}%`;
  return `${val}`;
}

// ============================================================
// OCDE DASHBOARD
// ============================================================
function OcdeDashboard() {
  const [expanded, setExpanded] = useState(null);
  const good = OCDE_DATA.filter(d=>d.status==="good").length;
  const warn = OCDE_DATA.filter(d=>d.status==="warning").length;
  const bad  = OCDE_DATA.filter(d=>d.status==="bad").length;

  const chartData = OCDE_DATA.filter(d=>d.format==="percent").map(d=>({
    name: d.label.replace("Participación Lab. Femenina","Part. Laboral Fem.")
                 .replace("Ingresos Tributarios / PIB","Ingresos Trib./PIB")
                 .replace("Gasto Ed. Superior / PIB","Ed. Superior/PIB")
                 .replace("Gasto Ed. Escolar / PIB","Ed. Escolar/PIB")
                 .replace("Crecimiento PIB 2024","Crec. PIB 2024"),
    Chile: d.chile, OCDE: d.ocde
  }));

  return (
    <div>
      {/* Score cards */}
      <div style={{display:"flex",gap:14,marginBottom:28,flexWrap:"wrap"}}>
        {[
          {count:good, label:"✅ Mejor que OCDE",   bg:"#dcfce7", color:"#166534"},
          {count:warn, label:"⚠️ Mixto / Mejorando", bg:"#fef9c3", color:"#854d0e"},
          {count:bad,  label:"❌ Bajo promedio OCDE", bg:"#fee2e2", color:"#991b1b"},
        ].map((s,i)=>(
          <div key={i} style={{flex:1,minWidth:150,background:s.bg,borderRadius:14,
            padding:"18px 20px",textAlign:"center"}}>
            <div style={{fontSize:36,fontWeight:900,color:s.color}}>{s.count}</div>
            <div style={{fontSize:12,color:s.color,fontWeight:700,marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Cards grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:16,marginBottom:32}}>
        {OCDE_DATA.map(item=>{
          const max   = Math.max(item.chile, item.ocde);
          const wC    = (item.chile/max)*100;
          const wO    = (item.ocde/max)*100;
          const isOpen= expanded===item.id;
          const barC  = item.status==="good"?"#22c55e":item.status==="warning"?"#f59e0b":"#ef4444";
          return (
            <div key={item.id} style={{background:"white",borderRadius:14,padding:20,
              boxShadow:"0 1px 4px rgba(0,0,0,0.08)",border:"1px solid #e5e7eb"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                <div>
                  <span style={{fontSize:22}}>{item.icon}</span>
                  <div style={{fontWeight:800,fontSize:15,color:"#111827",marginTop:4}}>{item.label}</div>
                  <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>{item.note}</div>
                </div>
                <StatusBadge status={item.status}/>
              </div>
              {["chile","ocde"].map(who=>(
                <div key={who} style={{marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                    <span style={{fontWeight:600,color:"#374151"}}>{who==="chile"?"🇨🇱 Chile":"🌍 OCDE promedio"}</span>
                    <span style={{fontWeight:800,color:"#111827"}}>{fmtVal(item[who],item.format)}</span>
                  </div>
                  <div style={{height:8,background:"#f3f4f6",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:4,transition:"width .5s",
                      width:`${who==="chile"?wC:wO}%`,
                      background:who==="chile"?barC:"#6366f1"}}/>
                  </div>
                </div>
              ))}
              <button onClick={()=>setExpanded(isOpen?null:item.id)} style={{
                width:"100%",marginTop:10,background:isOpen?"#fffbeb":"#f9fafb",
                border:`1px solid ${isOpen?"#f59e0b":"#e5e7eb"}`,borderRadius:8,
                padding:"8px 12px",cursor:"pointer",textAlign:"left",
                fontSize:12,fontWeight:700,color:isOpen?"#92400e":"#374151",
                display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>🔍 Lectura anti-trampa</span>
                <span style={{fontSize:10}}>{isOpen?"▲":"▼"}</span>
              </button>
              {isOpen&&(
                <div style={{marginTop:8,padding:"12px 14px",background:"#fffbeb",
                  borderRadius:8,border:"1px solid #fde68a"}}>
                  <p style={{fontSize:12,color:"#78350f",lineHeight:1.7,margin:"0 0 6px 0"}}>{item.antiTrap}</p>
                  <p style={{fontSize:11,color:"#92400e",fontStyle:"italic",margin:0}}>📚 {item.source}</p>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Chart */}
      <div style={{background:"white",borderRadius:14,padding:24,
        boxShadow:"0 1px 4px rgba(0,0,0,0.08)",border:"1px solid #e5e7eb"}}>
        <div style={{fontWeight:800,fontSize:15,color:"#111827",marginBottom:18}}>
          📊 Comparativa: indicadores porcentuales Chile vs OCDE
        </div>
        <ResponsiveContainer width="100%" height={290}>
          <BarChart data={chartData} margin={{top:5,right:20,left:0,bottom:75}}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f3f4f6"/>
            <XAxis dataKey="name" angle={-35} textAnchor="end" tick={{fontSize:10}}/>
            <YAxis tick={{fontSize:11}}/>
            <Tooltip/>
            <Legend verticalAlign="top"/>
            <Bar dataKey="Chile" fill="#ef4444" name="🇨🇱 Chile" radius={[4,4,0,0]}/>
            <Bar dataKey="OCDE"  fill="#6366f1" name="🌍 OCDE"  radius={[4,4,0,0]}/>
          </BarChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

function GovernmentsDashboard() {

    {etapa:"Fin Bachelet I",    deuda:5.8},

  return (

              color:active?"white":"#374151",

        {cats.map(cat=>{

              padding:"8px 16px",borderRadius:8,cursor:"pointer",fontWeight:600,fontSize:13,

        {/* ECONOMIC / SOCIAL / STRUCTURAL */}

          <>
            <h2 style={{margin:"0 0 4px 0",fontWeight:900,fontSize:19,color:gov.color}}>
