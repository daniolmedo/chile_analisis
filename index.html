/* ─── COMPONENTES HELPERS ─────────────────────────── */
function Badge({status}){
  const c=C[status];
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 10px',
    borderRadius:999,fontSize:11,fontWeight:700,background:c.bg,color:c.color,
    border:`1px solid ${c.border}`}}>{STATUS_LABEL[status]}</span>;
}

function AntiTrap({text, label='🔍 Lectura anti-trampa', source}){
  const [open,setOpen]=useState(false);
  return (
    <div style={{marginTop:12}}>
      <button onClick={()=>setOpen(!open)} style={{
        width:'100%',background:open?C.amber.bg:'#f9fafb',
        border:`1px solid ${open?C.amber.border:'#e5e7eb'}`,borderRadius:8,
        padding:'9px 14px',fontSize:12,fontWeight:700,
        color:open?C.amber.color:'#374151',
        display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span>{label}</span><span style={{fontSize:10}}>{open?'▲':'▼'}</span>
      </button>
      {open&&(
        <div className="fade-in" style={{marginTop:6,padding:'12px 14px',background:C.amber.bg,
          borderRadius:8,border:`1px solid ${C.amber.border}`}}>
          <p style={{fontSize:12,color:C.amber.color,lineHeight:1.75,marginBottom:source?6:0}}>{text}</p>
          {source&&<p style={{fontSize:11,color:C.amber.color,fontStyle:'italic',margin:0}}>📚 {source}</p>}
        </div>
      )}
    </div>
  );
}

function MetricCard({label,value,status}){
  const c=C[status];
  const icons={good:'✅',warning:'⚠️',bad:'❌'};
  return (
    <div style={{background:c.bg,borderRadius:10,padding:'12px 14px',border:`1px solid ${c.border}`}}>
      <div style={{fontSize:11,color:c.color,fontWeight:700,marginBottom:4}}>{icons[status]} {label}</div>
      <div style={{fontSize:15,fontWeight:900,color:c.color}}>{value}</div>
    </div>
  );
}

/* Barra comparativa CSS pura */
function CompareBar({labelA, valA, labelB, valB, fmtA, fmtB, colorA, status}){
  const max=Math.max(valA,valB);
  const wA=(valA/max)*100, wB=(valB/max)*100;
  const barColor=status==='good'?'#22c55e':status==='warning'?'#f59e0b':'#ef4444';
  const fmt=(v,f)=>f==='usd'?`US$${(v/1000).toFixed(0)}k`:f==='pct'?`${v}%`:`${v}`;
  return (
    <div style={{marginBottom:10}}>
      {[{label:labelA,val:valA,f:fmtA,color:barColor,w:wA},
        {label:labelB,val:valB,f:fmtB,color:'#6366f1',w:wB}].map((row,i)=>(
        <div key={i} style={{marginBottom:6}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
            <span style={{fontWeight:600,color:'#374151'}}>{row.label}</span>
            <span style={{fontWeight:800,color:'#111827'}}>{fmt(row.val,row.f)}</span>
          </div>
          <div style={{height:9,background:'#f3f4f6',borderRadius:5,overflow:'hidden'}}>
            <div style={{height:'100%',borderRadius:5,
              width:`${row.w}%`,background:row.color,
              transition:'width .6s ease'}}/>
          </div>
        </div>
      ))}
    </div>
  );
}

/* Gráfico de barras simple CSS */
function BarChart({data, unit='%', highlight}){
  const max=Math.max(...data.map(d=>d.val));
  return (
    <div style={{display:'flex',alignItems:'flex-end',gap:8,height:160,padding:'0 4px'}}>
      {data.map((d,i)=>{
        const h=Math.round((d.val/max)*130);
        const active=highlight===d.name;
        return (
          <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
            <span style={{fontSize:11,fontWeight:active?800:600,color:active?d.color:'#6b7280'}}>
              {d.val}{unit}
            </span>
            <div style={{width:'100%',height:h,background:d.color,borderRadius:'4px 4px 0 0',
              opacity:active?1:0.35,transition:'all .3s'}}/>
            <span style={{fontSize:10,color:active?d.color:'#6b7280',fontWeight:active?700:400,
              textAlign:'center',lineHeight:1.2}}>{d.name}</span>
          </div>
        );
      })}
    </div>
  );
}

/* Gráfico de línea simple CSS/SVG */
function LineChart({data}){
  const vals=data.map(d=>d.val);
  const min=Math.min(...vals), max=Math.max(...vals);
  const W=400,H=120,PAD=30;
  const pts=data.map((d,i)=>{
    const x=PAD+i*((W-PAD*2)/(data.length-1));
    const y=PAD+(1-(d.val-min)/(max-min))*(H-PAD*2);
    return {x,y,d};
  });
  const path=pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  return (
    <div style={{overflowX:'auto'}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',maxWidth:W}}>
        {/* Grid lines */}
        {[0,0.25,0.5,0.75,1].map((t,i)=>{
          const y=PAD+(1-t)*(H-PAD*2);
          const v=(min+(max-min)*t).toFixed(1);
          return <g key={i}>
            <line x1={PAD} y1={y} x2={W-10} y2={y} stroke="#f3f4f6" strokeWidth="1"/>
            <text x={PAD-4} y={y+4} fontSize="8" fill="#9ca3af" textAnchor="end">{v}%</text>
          </g>;
        })}
        {/* Line */}
        <path d={path} fill="none" stroke="#6366f1" strokeWidth="2.5" strokeLinejoin="round"/>
        {/* Dots + labels */}
        {pts.map((p,i)=>(
          <g key={i}>
            <circle cx={p.x} cy={p.y} r="4" fill="#6366f1"/>
            <text x={p.x} y={H-4} fontSize="7.5" fill="#6b7280" textAnchor="middle">
              {p.d.etapa.replace('Inicio ','').replace('Fin ','')}
            </text>
          </g>
        ))}
      </svg>
    </div>
  );
}
